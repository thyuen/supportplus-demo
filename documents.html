<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Support Plus - Documents</title>
  <link rel="stylesheet" href="./font.css" />
  <style>
    :root{
      --blue:#00609d;
      --blue-soft:#e7f2ff;
      --text:#243746;
      --muted:#6b7d8f;
      --line:#e6edf3;
      --bg:#f5f9fc;
      --card:#ffffff;
      --good-bg:#eaf8ef;
      --good:#19744b;
      --warn-bg:#fff4db;
      --warn:#9a6b00;
      --bad-bg:#ffe7e7;
      --bad:#b73b3b;
      --neutral-bg:#f2f5f8;
      --neutral:#5a6d7e;
      --shadow:0 8px 24px rgba(30,60,90,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: NotoSans-Regular, Arial, sans-serif;
      color:var(--text);
      background:var(--bg);
    }
    .app{display:flex; min-height:100vh;}
    .sidebar{
      width:220px; background:#fff; border-right:1px solid var(--line);
      position:fixed; left:0; top:0; bottom:0; padding:16px 0 72px; overflow:auto;
    }
    .brand{
      display:flex; align-items:center; gap:10px; padding:0 18px 18px; border-bottom:1px solid var(--line);
      margin-bottom:12px;
    }
    .brand img{height:40px}
    .brand-title{font-family:NotoSans-Bold, Arial, sans-serif; color:var(--blue); font-size:18px}
    .nav{padding:0 10px}
    .nav a{
      display:flex; align-items:center; gap:12px; text-decoration:none; color:#667;
      padding:12px 14px; border-radius:14px; margin:6px 0; font-size:14px;
    }
    .nav a img{width:24px; height:24px}
    .nav a.active{background:var(--blue-soft); color:var(--blue); font-family:NotoSans-Bold, Arial, sans-serif}
    .nav a:hover{background:#f4f8fb}
    .version{position:absolute; left:18px; bottom:18px; color:#7e90a0; font-size:12px}
    .main{margin-left:220px; flex:1; min-width:0;}
    .topbar{
      height:72px; background:#fff; border-bottom:1px solid var(--line);
      display:flex; align-items:center; justify-content:space-between; padding:0 28px;
      position:sticky; top:0; z-index:5;
    }
    .topbar h1{margin:0; font-size:22px; color:var(--blue); font-family:NotoSans-Bold, Arial, sans-serif}
    .profile{display:flex; align-items:center; gap:12px; color:var(--blue); font-family:NotoSans-Bold, Arial, sans-serif}
    .profile .avatar{
      width:38px; height:38px; border-radius:50%; background:#eef5fb; display:grid; place-items:center;
      font-size:14px;
    }
    .content{padding:28px}
    .page-head{display:flex; justify-content:space-between; align-items:flex-start; gap:18px; margin-bottom:20px}
    .subtitle{color:var(--muted); font-size:14px; margin-top:6px}
    .actions{display:flex; gap:10px; flex-wrap:wrap}
    .btn{
      border:1px solid var(--line); background:#fff; color:var(--text);
      border-radius:14px; padding:11px 16px; font-size:14px; cursor:pointer;
      box-shadow:var(--shadow); text-decoration:none; display:inline-flex; align-items:center; justify-content:center;
    }
    .btn.primary{background:var(--blue); border-color:var(--blue); color:#fff}
    .search-card,.table-card{
      background:var(--card); border:1px solid var(--line); border-radius:24px; box-shadow:var(--shadow);
    }
    .search-card{padding:18px 20px; margin-bottom:18px}
    .search-row{display:flex; gap:12px; align-items:center; flex-wrap:wrap}
    .search-row input{
      flex:1; min-width:240px; border:1px solid var(--line); border-radius:16px; padding:12px 14px; font-size:14px;
    }
    .stats-note{margin-top:10px; color:var(--muted); font-size:12px}
    .section-title{
      padding:18px 22px; border-bottom:1px solid var(--line);
      font-family:NotoSans-Bold, Arial, sans-serif; font-size:18px;
    }
    .table-wrap{overflow:auto}
    table{width:100%; border-collapse:collapse; min-width:980px}
    th,td{padding:14px 16px; text-align:left; border-bottom:1px solid #eef3f7; font-size:14px; vertical-align:top}
    th{background:#f9fbfd; color:#617487; font-family:NotoSans-Bold, Arial, sans-serif; white-space:nowrap}
    tr[data-href]{cursor:pointer}
    tr[data-href]:hover{background:#fbfdff}
    .badge{
      display:inline-flex; align-items:center; padding:6px 10px; border-radius:999px; font-size:12px;
      font-family:NotoSans-Bold, Arial, sans-serif;
    }
    .good{background:var(--good-bg); color:var(--good)}
    .warn{background:var(--warn-bg); color:var(--warn)}
    .bad{background:var(--bad-bg); color:var(--bad)}
    .neutral{background:var(--neutral-bg); color:var(--neutral)}
    .link{color:#1a69a8; text-decoration:none; word-break:break-all}
    .muted{color:var(--muted)}
    .cell-actions{display:flex; gap:8px}
    .mini-btn{
      padding:8px 10px; border:1px solid var(--line); background:#fff; border-radius:12px; font-size:12px; cursor:pointer;
    }
    .tip{padding:14px 22px; color:var(--muted); font-size:12px}
    .two-col{display:grid; grid-template-columns:1fr; gap:18px}
    @media (min-width:1200px){.two-col{grid-template-columns:1fr 1fr}}
    @media (max-width:900px){
      .sidebar{position:static; width:100%; height:auto}
      .main{margin-left:0}
      .app{display:block}
      .topbar{position:static}
      .content{padding:18px}
    }
  </style>
</head>
<body data-sidebar-current="documents" data-sidebar-version="v 1.1.7 demo" data-sidebar-org="HKU Nurse Portal Demo">
<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <img src="./assets/Logo.f79c58a9aa67e29e632bf19ddaf9660c.svg" alt="logo"/>
      <div><div style="font-weight:800;font-size:20px;color:#00609d">Support Plus</div><div class="org">HKU Nurse Portal Demo</div></div>
    </div>
    <nav class="nav"></nav>
    <img class="wave" src="./assets/Wave.b7c9b6667e0b96d1b69eb66433533826.svg" alt=""/>
    <div class="version">v 1.1.7</div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h1>Documents</h1>
      <div class="profile">
        <div class="avatar">JY</div>
        <div>John Yuen<br><span style="font-weight:400;color:#8b9cac;font-size:12px">HKU</span></div>
      </div>
    </div>

    <div class="summary card">
      <div>
        <h2>Documents</h2>
        <p>Browse and manage internal documents across all knowledge bases.</p>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-light" id="clearFilters" type="button">Clear</button>
        <button class="btn" id="refreshBtn" type="button">Refresh</button>
      </div>
    </div>

    <div class="card">
      <div class="controls">
        <div class="controls-grid">
          <div class="field">
            <label>Search</label>
            <input id="searchInput" placeholder="Search documents, paths, KB name, errors…" />
          </div>
          <div class="field">
            <label>Knowledge base</label>
            <select id="kbFilter">
              <option value="">All KBs</option>
              <option value="nccn-guidelines">NCCN Oncology Guidelines</option>
              <option value="hku-protocols">HKU Internal Protocols</option>
              <option value="education-library">Patient Education Library</option>
            </select>
          </div>
          <div class="field">
            <label>Status</label>
            <select id="statusFilter">
              <option value="">All statuses</option>
              <option value="ok">Up to date</option>
              <option value="skipped">No change</option>
              <option value="error">Needs attention</option>
              <option value="new">New</option>
            </select>
          </div>
        </div>
      </div>

      <div class="meta">
        <div>Tip: click a row to open its knowledge base details.</div>
        <div style="margin-left:auto">Showing <strong id="showingCount">0</strong>/<strong id="allCount">0</strong></div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Location</th>
              <th>Status</th>
              <th>Last ingested</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="docsBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="demo-note">Documents demo</div>

<script src="./shared-sidebar.js"></script>
<script>
const docData = [
  {
    id:'doc_201', sourceId:'nccn-guidelines', sourceTitle:'NCCN Oncology Guidelines',
    title:'Breast Cancer Guideline', filename:'Breast_Cancer_Guideline.pdf',
    folder:'content/NCCN', status:'ok', last:'2026-03-11 12:10', error:''
  },
  {
    id:'doc_202', sourceId:'nccn-guidelines', sourceTitle:'NCCN Oncology Guidelines',
    title:'Lung Cancer Guideline', filename:'Lung_Cancer_Guideline.pdf',
    folder:'content/NCCN', status:'ok', last:'2026-03-11 12:09', error:''
  },
  {
    id:'doc_203', sourceId:'hku-protocols', sourceTitle:'HKU Internal Protocols',
    title:'Nursing Protocol v3', filename:'Nursing_Protocol_v3.docx',
    folder:'content/HKU/Oncology', status:'error', last:'2026-03-08 16:45', error:'Folder parse failed on /Triage'
  },
  {
    id:'doc_204', sourceId:'hku-protocols', sourceTitle:'HKU Internal Protocols',
    title:'Oncology Triage Escalation', filename:'Oncology_Triage_Escalation.docx',
    folder:'content/HKU/Oncology', status:'new', last:'—', error:''
  },
  {
    id:'doc_205', sourceId:'education-library', sourceTitle:'Patient Education Library',
    title:'Managing Nausea After Chemotherapy', filename:'Managing_Nausea_After_Chemotherapy.docx',
    folder:'content/PatientEducation', status:'skipped', last:'2026-03-10 09:35', error:''
  }
];

const body = document.getElementById('docsBody');
const searchInput = document.getElementById('searchInput');
const kbFilter = document.getElementById('kbFilter');
const statusFilter = document.getElementById('statusFilter');

function pill(status){
  if(status==='ok') return '<span class="pill good">Up to date</span>';
  if(status==='skipped') return '<span class="pill neutral">No change</span>';
  if(status==='error') return '<span class="pill bad">Needs attention</span>';
  if(status==='new') return '<span class="pill warn">New</span>';
  return '<span class="pill neutral">'+status+'</span>';
}
function rowTarget(sourceId){
  return './source-details.html?id=' + encodeURIComponent(sourceId);
}
function render(){
  const q = searchInput.value.trim().toLowerCase();
  const kb = kbFilter.value;
  const st = statusFilter.value;

  const filtered = docData.filter(r => {
    if (kb && r.sourceId !== kb) return false;
    if (st && r.status !== st) return false;
    if (!q) return true;
    return [r.title, r.filename, r.folder, r.sourceTitle, r.error].join(' ').toLowerCase().includes(q);
  });

  body.innerHTML = filtered.map(r => `
    <tr class="doc-row" data-href="${rowTarget(r.sourceId)}">
      <td>
        <div class="doc-title">
          <div class="doc-icon"><img src="./assets/fileBlue.svg" alt=""></div>
          <div>
            <div style="font-weight:800">${r.title}</div>
            <div class="filename">${r.filename}</div>
          </div>
        </div>
      </td>
      <td>
        <div style="font-weight:700">${r.sourceTitle}</div>
        <div class="folder">${r.folder || '—'}</div>
      </td>
      <td>
        ${pill(r.status)}
        ${r.status === 'error' && r.error ? `<div class="folder" style="max-width:220px">${r.error}</div>` : ''}
      </td>
      <td>${r.last}</td>
      <td>
        <button class="btn btn-light" onclick="event.stopPropagation();location.href='${rowTarget(r.sourceId)}'">Open KB</button>
      </td>
    </tr>
  `).join('') || '<tr><td colspan="5" style="color:#6b7280">No documents found.</td></tr>';

  body.querySelectorAll('.doc-row').forEach(tr => {
    tr.addEventListener('click', () => {
      location.href = tr.getAttribute('data-href');
    });
  });

  document.getElementById('showingCount').textContent = filtered.length;
  document.getElementById('allCount').textContent = docData.length;
}

[searchInput, kbFilter, statusFilter].forEach(el => el.addEventListener('input', render));
document.getElementById('clearFilters').onclick = () => {
  searchInput.value = '';
  kbFilter.value = '';
  statusFilter.value = '';
  render();
};
document.getElementById('refreshBtn').onclick = render;
render();
</script>
</body>
</html>
