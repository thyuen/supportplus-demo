<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Support Plus - Documents</title>
<link rel="stylesheet" href="./font.css">
</head>

<body data-sidebar-current="documents">

<script src="./shared-sidebar.js"></script>

<div class="main">

<h1>Documents</h1>
<p>Browse and manage internal documents across knowledge bases.</p>

<input id="search" placeholder="Search documents..." style="width:300px;padding:8px">

<br><br>

<table border="1" style="width:100%;border-collapse:collapse">

<tr>
<th>Title</th>
<th>Location</th>
<th>Status</th>
<th>Last ingested</th>
<th>Action</th>
</tr>

<tr onclick="openSource('nccn-guidelines')" style="cursor:pointer">
<td>Breast Cancer Guideline</td>
<td>NCCN Oncology Guidelines</td>
<td>Up to date</td>
<td>2026-03-11</td>
<td><button onclick="event.stopPropagation();openSource('nccn-guidelines')">Open KB</button></td>
</tr>

<tr onclick="openSource('hku-protocols')" style="cursor:pointer">
<td>Nursing Protocol v3</td>
<td>HKU Internal Protocols</td>
<td>Needs attention</td>
<td>2026-03-08</td>
<td><button onclick="event.stopPropagation();openSource('hku-protocols')">Open KB</button></td>
</tr>

</table>

</div>

<script>
function openSource(id){
  window.location = "source-details.html?id=" + id;
}
</script>

</body>
</html>
